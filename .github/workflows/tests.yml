name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          pytest -q

  build_windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Run build script
        run: |
          python build.py
      - name: Verify Build Artifacts
        run: |
          if (!(Test-Path "dist/Setup-YTDownloader.exe")) { throw "Setup-YTDownloader.exe not found" }
          if (!(Test-Path "dist/YT-Downloader.exe")) { throw "YT-Downloader.exe not found" }
          if (!(Test-Path "dist/uninstaller.exe")) { throw "uninstaller.exe not found" }
        shell: pwsh
