name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Application and Installer
      id: build_step
      run: |
        python build.py
      continue-on-error: false

    - name: Verify Build Artifacts
      run: |
        if (!(Test-Path "dist/Setup-YTDownloader.exe")) { throw "Setup-YTDownloader.exe not found" }
        if (!(Test-Path "dist/YT-Downloader.exe")) { throw "YT-Downloader.exe not found" }
        if (!(Test-Path "dist/uninstaller.exe")) { throw "uninstaller.exe not found" }
      shell: pwsh

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: |
          dist/Setup-YTDownloader.exe
          dist/YT-Downloader.exe
          dist/uninstaller.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
